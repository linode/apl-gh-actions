name: Release Derive Branch
description: Derive the next release branch name from the highest stable tag.
inputs:
  bump_type:
    description: Version bump type (minor or major).
    required: true
  release_branch_prefix:
    description: Prefix for release branch names.
    required: false
    default: releases/
outputs:
  branch:
    description: Derived release branch name.
runs:
  using: node24
  main: dist/index.js
