name: Cut Release Branch

on:
  workflow_call:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: string
      base_branch:
        description: 'Branch to cut from'
        required: false
        default: 'main'
        type: string
      release_branch_prefix:
        description: 'Prefix for release branches'
        required: false
        default: 'releases/'
        type: string
      dry_run:
        description: 'Dry run — skip all writes (git push)'
        required: true
        type: boolean

env:
  RELEASE_BRANCH_PREFIX: ${{ inputs.release_branch_prefix }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release-create-branch:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0
          token: ${{ env.GITHUB_TOKEN }}


      - name: Derive release branch from highest stable tag
        id: derive-branch
        uses: linode/apl-gh-actions/actions/release-derive-branch@0.2.1
        with:
          bump_type: ${{ inputs.bump_type }}
          release_branch_prefix: ${{ env.RELEASE_BRANCH_PREFIX }}

      - name: Check release branch does not already exist
        uses: linode/apl-gh-actions/actions/release-check-branch-not-exists@0.2.1
        with:
          release_branch: ${{ steps.derive-branch.outputs.branch }}

      - name: Configure git identity
        env:
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "${ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Create release branch
        if: ${{ !inputs.dry_run }}
        uses: linode/apl-gh-actions/actions/release-create-branch@0.2.1
        with:
          release_branch: ${{ steps.derive-branch.outputs.branch }}

      - name: Push release branch
        if: ${{ !inputs.dry_run }}
        run: git push origin "${{ steps.derive-branch.outputs.branch }}"
