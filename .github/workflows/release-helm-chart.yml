name: Release Helm Chart
on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to build the charts from'
        required: true
        type: string
      dry_run:
        description: 'Skip chart preparation and publication'
        required: true
        type: boolean
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build the charts from'
        required: true
        type: string
      dry_run:
        description: 'Dry run — skip chart preparation and publication'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release-helm-chart:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ci/.nvmrc

      - name: Install CI dependencies
        working-directory: ci
        run: npm ci

      - name: Prepare Helm chart
        if: ${{ !inputs.dry_run }}
        run: ci/scripts/prepare_chart_for_release.sh
        env:
          CHART_PATH: chart/apl-test
          RELEASE_TAG: ${{ inputs.release_tag }}

      - name: Publish Helm chart
        if: ${{ !inputs.dry_run }}
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: chart
          skip_existing: true
          mark_as_latest: false
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}