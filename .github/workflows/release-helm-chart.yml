name: Release Helm Chart
on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to build the charts from'
        required: true
        type: string
      dry_run:
        description: 'Skip chart preparation and publication'
        required: true
        type: boolean
      charts_dir:
        description: 'Directory containing Helm charts'
        required: false
        default: chart
        type: string
      chart_name:
        description: 'Name of the Helm chart to release'
        required: false
        default: apl-test
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build the charts from'
        required: true
        type: string
      dry_run:
        description: 'Dry run — skip chart preparation and publication'
        required: true
        default: true
        type: boolean
      charts_dir:
        description: 'Directory containing Helm charts'
        required: false
        default: chart
        type: string
      chart_name:
        description: 'Name of the Helm chart to release'
        required: false
        default: apl-test
        type: string

permissions:
  contents: write

jobs:
  release-helm-chart:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - name: Configure git identity
        env:
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "${ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
      - name: Prepare Helm chart
        if: ${{ !inputs.dry_run }}
        uses: linode/apl-gh-actions/actions/release-prepare-chart-for-release@0.2.3
        with:
          chart_path: ${{ inputs.charts_dir }}/${{ inputs.chart_name }}
          release_tag: ${{ inputs.release_tag }}

      - name: Publish Helm chart
        if: ${{ !inputs.dry_run }}
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: ${{ inputs.charts_dir }}
          skip_existing: true
          mark_as_latest: false
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}