name: Release Get Tag

on:
  workflow_call:
    inputs:
      is_prerelease:
        description: 'Derive an RC tag instead of a stable tag'
        required: true
        type: boolean
      release_branch:
        description: 'Release branch to derive the tag from'
        required: true
        type: string
      release_branch_prefix:
        description: 'Prefix required for release branches'
        required: false
        default: 'releases/'
        type: string
      release_tag_prefix:
        description: 'Prefix to add to release tags'
        required: false
        default: 'v'
        type: string
    outputs:
      release_tag:
        description: 'Derived and validated release tag'
        value: ${{ jobs.release-get-tag.outputs.release_tag }}

jobs:
  release-get-tag:
    runs-on: ubuntu-22.04
    outputs:
      release_tag: ${{ steps.compute-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_branch }}
          fetch-depth: 0

      - name: Validate release branch
        run: |
          if [[ "$RELEASE_BRANCH" != $RELEASE_BRANCH_PREFIX* ]]; then
            echo "::error::release_from_branch may only run on $RELEASE_BRANCH_PREFIX* branches. Got: $RELEASE_BRANCH"
            exit 1
          fi
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
          RELEASE_BRANCH_PREFIX: ${{ inputs.release_branch_prefix }}

      - name: Compute release tag
        id: compute-tag
        uses: linode/apl-gh-actions/actions/release-compute-tag@main
        with:
          is_prerelease: ${{ inputs.is_prerelease }}
          release_branch: ${{ inputs.release_branch }}
          release_branch_prefix: ${{ inputs.release_branch_prefix }}
          release_tag_prefix: ${{ inputs.release_tag_prefix }}

      - name: Check tag does not already exist
        uses: linode/apl-gh-actions/actions/release-check-tag-not-exists@main
        with:
          release_tag: ${{ steps.compute-tag.outputs.tag }}