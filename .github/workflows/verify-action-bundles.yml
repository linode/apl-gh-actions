name: Verify Action Bundles

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-action-bundles:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.11.0'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild action bundles
        run: npm run build:actions

      - name: Verify generated files are committed
        run: |
          git update-index --refresh
          git diff --exit-code -- actions/**/dist/index.js
