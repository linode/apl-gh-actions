name: Release Software

on:
  workflow_call:
    inputs:
      is_prerelease:
        description: 'Cut an RC tag instead of a stable tag'
        required: true
        type: boolean
      dry_run:
        description: 'Skip all writes (tag, release, and Docker push)'
        required: true
        type: boolean
      release_branch:
        description: 'Release branch to tag'
        required: true
        type: string
      release_tag:
        description: 'Validated release tag to create'
        required: true
        type: string
      container_registry:
        description: 'Container registry to push release images to (e.g.: docker.io, ghcr.io, etc.)'
        required: true
        type: string
      container_image:
        description: 'Container repository to push release images to. Can contain org name (e.g. linode/apl-gh-actions)'
        required: true
        type: string
    secrets:
      oci_username:
        description: 'Username used to authenticate to the container registry'
        required: true
      oci_password:
        description: 'Password or token used to authenticate to the container registry'
        required: true

env:
  RELEASE_BRANCH: ${{ inputs.release_branch }}
  CONTAINER_IMAGE_TAG: "${{ inputs.container_registry }}/${{ inputs.container_image }}:${{ inputs.release_tag }}"
  OCI_USERNAME: ${{ secrets.oci_username }}
  OCI_PASSWORD: ${{ secrets.oci_password }}

jobs:
  release-software:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Ensure the image builds before creating a release tag.
      - name: Run tests in Docker (test gate)
        uses: docker/build-push-action@v7
        with:
          push: false
          load: true
          context: .
          build-args: |
            SKIP_TESTS=false
            VERSION=${{ inputs.release_tag }}
          tags: ${{ env.CONTAINER_IMAGE_TAG }}

      - name: Configure git identity
        env:
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "${ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Create and push git tag
        uses: linode/apl-gh-actions/actions/release-tag@0.2.1
        with:
          release_tag: ${{ inputs.release_tag }}
          dry_run: ${{ inputs.dry_run }}

      - name: Login to Docker Hub
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.container_registry }}
          username: ${{ env.OCI_USERNAME }}
          password: ${{ env.OCI_PASSWORD }}

      - name: Run tests in Docker (push gate)
        if: ${{ !inputs.dry_run }}
        uses: docker/build-push-action@v7
        with:
          push: true
          load: true
          context: .
          build-args: |
            SKIP_TESTS=true
            VERSION=${{ inputs.release_tag }}
          tags: ${{ env.CONTAINER_IMAGE_TAG }}

      - name: Create GitHub Release
        uses: linode/apl-gh-actions/actions/release-create-github-release@0.2.1
        with:
          release_tag: ${{ inputs.release_tag }}
          is_prerelease: ${{ inputs.is_prerelease }}
          dry_run: ${{ inputs.dry_run }}
          github_token: ${{ secrets.GITHUB_TOKEN }}