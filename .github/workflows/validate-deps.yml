name: Validate Dependencies

on:
  workflow_call:
    inputs:
      is_prerelease:
        description: 'Allow RC versions for a prerelease'
        required: true
        type: boolean
      release_branch:
        description: 'Release branch containing versions.yaml'
        required: true
        type: string

jobs:
  validate-deps:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_branch }}

      - name: Check versions.yaml entries are semver-compatible
        uses: linode/apl-gh-actions/actions/release-check-versions-yaml@0.2.3
        with:
          repo_root: ${{ github.workspace }}
          is_prerelease: ${{ inputs.is_prerelease }}
          github_token: ${{ secrets.GITHUB_TOKEN }}